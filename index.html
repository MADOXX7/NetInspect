<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NetInspect Network Tools</title>

    <meta name="description"
          content="Check your public IP address, location, ISP and network information instantly.">

    <meta name="keywords"
          content="ip checker, my ip, public ip, ip lookup">

    <meta name="author"
          content="Madoxx7">

    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <h1>NetInspect Network Tools</h1>

        <p class="subtitle">
            Inspect your connection, IP address and network information.
        </p>

        <section class="card">

            <h2>Your IP Address</h2>

            <div id="ip" class="ip-address">
                Loading...
            </div>

            <button onclick="copyIp()">
                Copy IP
            </button>

            <div class="info">

                <div>
                    <span>Country</span>
                    <strong id="country">-</strong>
                </div>

                <div>
                    <span>Region</span>
                    <strong id="region">-</strong>
                </div>

                <div>
                    <span>City</span>
                    <strong id="city">-</strong>
                </div>

                <div>
                    <span>ISP</span>
                    <strong id="isp">-</strong>
                </div>

                <div>
                    <span>Browser</span>
                    <strong id="browser">-</strong>
                </div>

                <div>
                    <span>Operating System</span>
                    <strong id="os">-</strong>
                </div>

            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 NetInspect</p>
    </footer>

    <script src="js/app.js"></script>

</body>
</html>
